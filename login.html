<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexHire — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Back to Home -->
  <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

  <div class="auth-container">
    <div class="auth-card">
      <!-- Brand -->
      <div class="auth-brand">
        <i class="fa-solid fa-bolt-lightning brand-icon"></i>
        <span>NexHire</span>
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Sign in to continue your journey</p>

      <!-- Error/Success Messages -->
      <div id="authMessage" class="auth-message hidden"></div>

      <!-- Google Sign In -->
      <button class="btn-google" id="googleSignIn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20"/>
        Continue with Google
      </button>

      <div class="divider"><span>or sign in with email</span></div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label><i class="fa-solid fa-envelope"></i> Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label><i class="fa-solid fa-lock"></i> Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="Your password" required/>
            <button type="button" class="toggle-pw" onclick="togglePw('loginPassword',this)">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>

    <!-- Right Panel -->
    <div class="auth-panel">
      <div class="panel-content">
        <div class="panel-icon"><i class="fa-solid fa-rocket"></i></div>
        <h3>Launch Your Career Today</h3>
        <p>Thousands of companies are actively hiring. Your dream job is one click away.</p>
        <div class="panel-stats">
          <div><strong>12K+</strong><span>Open Roles</span></div>
          <div><strong>8K+</strong><span>Companies</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const msgEl = document.getElementById('authMessage');

    function showMsg(text, type='error') {
      msgEl.textContent = text;
      msgEl.className = `auth-message ${type}`;
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<i class="fa-solid fa-circle-notch fa-spin"></i> Please wait...'
        : '<span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>';
    }

    // Redirect if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) await redirectUser(user);
    });

    // Redirect based on role
    async function redirectUser(user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) {
        window.location.href = 'role_select.html';
        return;
      }
      const role = snap.data().role;
      if (role === 'employer') window.location.href = 'employer_dashboard.html';
      else window.location.href = 'jobseeker_dashboard.html';
    }

    // Email/Password Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      setLoading(btn, true);
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        showMsg('Login successful! Redirecting...', 'success');
        await redirectUser(cred.user);
      } catch (err) {
        let msg = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        else if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        showMsg(msg);
        setLoading(btn, false);
      }
    });

    // Google Sign In
    document.getElementById('googleSignIn').addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) {
          // First time Google login — save basic info, then select role
          await setDoc(doc(db, 'users', user.uid), {
            uid: user.uid, name: user.displayName,
            email: user.email, role: null,
            createdAt: serverTimestamp()
          });
          window.location.href = 'role_select.html';
        } else {
          await redirectUser(user);
        }
      } catch (err) {
        showMsg('Google sign-in failed: ' + err.message);
      }
    });
  </script>

  <script>
    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.innerHTML = el.type === 'password'
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
    }
  </script>
</body>
</html>
